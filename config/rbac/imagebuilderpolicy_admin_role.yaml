# This rule is not used by the project image-builder-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over build.dana.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: image-builder-operator
    app.kubernetes.io/managed-by: kustomize
  name: imagebuilderpolicy-admin-role
rules:
- apiGroups:
  - build.dana.io
  resources:
  - imagebuilderpolicies
  verbs:
  - '*'
- apiGroups:
  - build.dana.io
  resources:
  - imagebuilderpolicies/status
  verbs:
  - get
