---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - build.dana.io
  resources:
  - imagebuildpolicies
  - imagebuilds
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - build.dana.io
  resources:
  - imagebuildpolicies/finalizers
  - imagebuilds/finalizers
  verbs:
  - update
- apiGroups:
  - build.dana.io
  resources:
  - imagebuildpolicies/status
  - imagebuilds/status
  verbs:
  - get
  - patch
  - update
