apiVersion: v1
kind: Service
metadata:
  name: {{ include "image-builder-operator.fullname" . }}-webhook-service
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/created-by: image-builder-operator
    app.kubernetes.io/part-of: image-builder-operator
  {{- include "image-builder-operator.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    control-plane: controller-manager
    {{- include "image-builder-operator.selectorLabels" . | nindent 4 }}
  type: ClusterIP
