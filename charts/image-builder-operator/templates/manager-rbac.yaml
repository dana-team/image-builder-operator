apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "image-builder-operator.fullname" . }}-manager-role
  labels:
  {{- include "image-builder-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - build.dana.io
  resources:
  - imagebuilds
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - build.dana.io
  resources:
  - imagebuilds/finalizers
  verbs:
  - update
- apiGroups:
  - build.dana.io
  resources:
  - imagebuilds/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - build.dana.io
  resources:
  - imagebuildpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - shipwright.io
  resources:
  - buildruns
  verbs:
  - create
  - get
  - list
  - watch
- apiGroups:
  - shipwright.io
  resources:
  - builds
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - shipwright.io
  resources:
  - clusterbuildstrategies
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "image-builder-operator.fullname" . }}-manager-rolebinding
  labels:
  {{- include "image-builder-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "image-builder-operator.fullname" . }}-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "image-builder-operator.fullname" . }}-controller-manager'
  namespace: '{{ .Release.Namespace }}'
