version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      k8s.io:
          patterns:
            - "k8s.io/*"
    labels:
      - "go dependencies"
    commit-message:
      prefix: "build"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci dependencies"
    commit-message:
      prefix: "ci"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "docker dependencies"
    commit-message:
      prefix: "build"
